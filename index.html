<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Admitere Bucuresti</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-tertiary: #151720;
      --bg-sub: #1e2136;
      --border-color: #2a2d3a;
      --border-subtle: #1e2136;
      --text-primary: #e1e4ea;
      --text-secondary: #8b8fa3;
      --text-muted: #6b6f82;
      --text-white: #ffffff;
      --accent: #6c63ff;
      --accent-dark: #5a52e0;
      --accent-soft: rgba(108, 99, 255, 0.15);
      --green: #4ade80;
      --green-soft: rgba(74, 222, 128, 0.1);
      --yellow: #fbbf24;
      --red: #ff6b6b;
      --gold: #ffd700;
      --gray: #525252;
      --gray-hover: #404040;
      --radius: 8px;
      --radius-sm: 4px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
      font-size: 14px;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-white);
      margin-bottom: 0.2rem;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .controls input,
    .controls select {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 0.7rem;
      border-radius: var(--radius);
      font-size: 0.82rem;
      outline: none;
      flex: 1;
      min-width: 0;
      transition: border-color 0.2s;
    }

    .controls input:focus,
    .controls select:focus {
      border-color: var(--accent);
    }

    .controls input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: var(--radius);
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--accent-dark); }

    .btn-reset {
      background: var(--gray);
      width: 36px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-reset:hover { background: var(--gray-hover); }

    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .status.error { color: var(--red); }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Table wrapper for horizontal scroll on mobile */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--bg-tertiary);
      padding: 0.6rem 0.7rem;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover { color: var(--text-primary); }

    td {
      padding: 0.6rem 0.7rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .school-row:hover td {
      background: var(--bg-secondary);
    }

    .school-header td {
      border-bottom: 2px solid var(--border-color);
    }

    .school-body-inner {
      padding: 0.75rem;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sub-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin-bottom: 1rem;
    }

    .sub-table th {
      background: var(--bg-sub);
      padding: 0.5rem 0.6rem;
    }

    .sub-table td {
      padding: 0.45rem 0.6rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    /* Fix: hover must NOT override highlight-green for filtered profiles */
    .sub-table tbody tr.highlight-green,
    .sub-table tbody tr.highlight-green:hover {
      background: var(--green-soft) !important;
    }

    .sub-table tbody tr.highlight-green td {
      color: var(--green) !important;
    }

    .sub-table tbody tr:hover:not(.highlight-green) {
      background: var(--bg-secondary);
    }

    .badge-group {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.72rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    td.rank {
      font-weight: 700;
      color: var(--accent);
      width: 36px;
      text-align: center;
      font-size: 0.82rem;
    }

    td.rank.top3 { color: var(--gold); font-size: 0.9rem; }

    td.name {
      font-weight: 500;
      color: var(--text-white);
    }

    td.code {
      color: var(--text-muted);
      font-family: monospace;
      font-size: 0.75rem;
    }

    td.value-high { color: var(--green); font-weight: 600; }
    td.value-medium { color: var(--yellow); font-weight: 600; }
    td.value-low { color: var(--red); font-weight: 600; }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .legend {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .dot-green { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-red { background: var(--red); }

    .highlight-green {
      background: var(--green-soft);
    }

    .highlight-green td {
      color: var(--green);
    }

    /* Tablet breakpoint */
    @media (min-width: 600px) {
      body {
        padding: 1.5rem 1rem;
      }

      header h1 {
        font-size: 1.5rem;
      }

      header p {
        font-size: 0.85rem;
      }

      .controls {
        gap: 0.75rem;
      }

      .controls input,
      .controls select {
        font-size: 0.85rem;
        padding: 0.55rem 0.8rem;
      }

      td {
        padding: 0.7rem 0.85rem;
        font-size: 0.85rem;
      }

      .school-body-inner {
        padding: 0.85rem 0.85rem 0.85rem 2rem;
      }

      .section-title {
        font-size: 0.8rem;
      }
    }

    /* Desktop breakpoint */
    @media (min-width: 960px) {
      body {
        padding: 2rem 1rem;
      }

      .container {
        max-width: 1000px;
      }

      header {
        margin-bottom: 2rem;
      }

      header h1 {
        font-size: 1.75rem;
      }

      header p {
        font-size: 0.9rem;
      }

      .controls {
        margin-bottom: 1.25rem;
      }

      .controls input,
      .controls select {
        font-size: 0.9rem;
        padding: 0.6rem 1rem;
      }

      .btn {
        font-size: 0.9rem;
        padding: 0.6rem 1.5rem;
      }

      .btn-reset {
        width: 40px;
        height: 38px;
        font-size: 1rem;
      }

      td {
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
      }

      .school-header td {
        padding: 0.85rem 1rem;
      }

      .school-body-inner {
        padding: 1rem 1rem 1rem 3rem;
      }

      .section-title {
        font-size: 0.85rem;
      }

      .sub-table {
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
      }

      .sub-table th {
        padding: 0.6rem 0.8rem;
        font-size: 0.75rem;
      }

      .sub-table td {
        padding: 0.55rem 0.8rem;
      }

      .info-bar {
        margin-top: 1rem;
        font-size: 0.82rem;
      }

      .legend {
        gap: 1.25rem;
      }

      .legend-item {
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Top Admitere Bucuresti</h1>
      <p id="genInfo">Se incarca datele...</p>
    </header>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Cauta liceu..." />
      <select id="profileSelect">
        <option value="">Toate profilurile</option>
      </select>
      <input type="text" id="filterInput" placeholder="Medie adm." />
      <button class="btn btn-reset" id="resetBtn" title="Reseteaza" aria-label="Reseteaza">✕</button>
    </div>

    <div class="table-wrapper" id="app"></div>
  </div>

  <script>
    // ===== DATA LOADER =====

    class DataLoader {
      static async load(path) {
        const resp = await fetch(path || 'data.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      }
    }

    // ===== SCHOOL MODEL =====

    class School {
      constructor(raw) {
        this.nume = raw.nume;
        this.siiir = raw.siiir;
        this.medieBac = raw.medieBac;
        this.medieAdm = raw.medieAdm;
        this.rataPromovare = raw.rataPromovare;
        this.numCandidati = raw.numCandidati;
        this.rank = raw.rank;
        this.grupuri = (raw.profiluri && raw.profiluri.grupuri) || [];
        this.profiluri = (raw.profiluri && raw.profiluri.profiluri) || [];
      }
    }

    // ===== LIST MANAGER =====

    class SchoolList {
      constructor() {
        this.all = [];
        this.filtered = [];
        this.searchQuery = '';
        this.filterMedie = null;
        this.profileFilter = '';
        this.sortKey = 'rank';
        this.sortDir = 'asc';
        this.uniqueProfiles = [];
      }

      setSchools(rawList) {
        this.all = rawList.map(r => new School(r));
        this.uniqueProfiles = this._collectProfiles();
      }

      applyAllFilters() {
        this.applyFilters();
      }

      _collectProfiles() {
        var set = new Set();
        this.all.forEach(function(s) {
          if (s.profiluri) {
            s.profiluri.forEach(function(p) { if (p.nume) set.add(p.nume); });
          }
          if (s.grupuri) {
            s.grupuri.forEach(function(g) { if (g.nume) set.add(g.nume); });
          }
        });
        return [...set].sort();
      }

      setSearch(query) {
        this.searchQuery = query.toLowerCase().trim();
        localStorage.setItem('bacplus_search', query);
        this.applyFilters();
      }

      setMedieFilter(value) {
        this.filterMedie = value === '' ? null : parseFloat(value);
        localStorage.setItem('bacplus_medie', value);
        this.applyFilters();
      }

      setProfileFilter(value) {
        this.profileFilter = value;
        localStorage.setItem('bacplus_profile', value);
        this.applyFilters();
      }

      sort(key, dir) {
        this.sortKey = key;
        this.sortDir = dir;
        this.applyFilters();
      }

      profileMatchesFilter(profile) {
        if (this.filterMedie == null) return false;
        if (profile.medieAdm == null) return false;
        if (this.profileFilter) {
          if (!this.profileNameMatchesFilter(profile.nume)) return false;
        }
        return profile.medieAdm <= this.filterMedie;
      }

      profileNameMatchesFilter(profileName) {
        if (this.profileFilter === '') return true;
        return profileName.toLowerCase().includes(this.profileFilter.toLowerCase());
      }

      schoolMatchesProfile(school) {
        if (this.profileFilter === '') return true;
        var q = this.profileFilter.toLowerCase();
        if (school.profiluri) {
          for (var i = 0; i < school.profiluri.length; i++) {
            if (school.profiluri[i].nume.toLowerCase().includes(q)) return true;
          }
        }
        if (school.grupuri) {
          for (var i = 0; i < school.grupuri.length; i++) {
            if (school.grupuri[i].nume.toLowerCase().includes(q)) return true;
          }
        }
        return false;
      }

      applyFilters() {
        var self = this;
        this.filtered = this.all.filter(function(s) {
          // Filtu 1: nume liceu
          if (self.searchQuery && !s.nume.toLowerCase().includes(self.searchQuery)) {
            return false;
          }

          // Filtu 2: profil selectat
          if (self.profileFilter && !self.schoolMatchesProfile(s)) {
            return false;
          }

          // Filtu 3: medie
          if (self.filterMedie != null) {
            if (self.profileFilter) {
              // Profil selectat - verific doar profilul selectat
              var found = false;
              if (s.profiluri) {
                for (var i = 0; i < s.profiluri.length; i++) {
                  if (self.profileNameMatchesFilter(s.profiluri[i].nume)) {
                    found = true;
                    if (s.profiluri[i].medieAdm != null && s.profiluri[i].medieAdm > self.filterMedie) {
                      return false;
                    }
                  }
                }
              }
              if (!found && s.grupuri) {
                for (var i = 0; i < s.grupuri.length; i++) {
                  if (self.profileNameMatchesFilter(s.grupuri[i].nume)) {
                    found = true;
                    if (s.grupuri[i].medieAdm != null && s.grupuri[i].medieAdm > self.filterMedie) {
                      return false;
                    }
                  }
                }
              }
              if (!found) return false;
            } else {
              // Fara profil selectat - verific media generala
              if (s.medieAdm != null && s.medieAdm > self.filterMedie) {
                return false;
              }
            }
          }

          return true;
        });

        this.filtered.sort((a, b) => {
          if (this.sortKey === 'nume') {
            return this.sortDir === 'asc'
              ? a.nume.localeCompare(b.nume)
              : b.nume.localeCompare(a.nume);
          }
          var va = a[this.sortKey] != null ? a[this.sortKey] : -Infinity;
          var vb = b[this.sortKey] != null ? b[this.sortKey] : -Infinity;
          return this.sortDir === 'asc' ? va - vb : vb - va;
        });
      }

      reset() {
        this.searchQuery = '';
        this.filterMedie = null;
        this.profileFilter = '';
        this.sortKey = 'rank';
        this.sortDir = 'asc';
        localStorage.removeItem('bacplus_search');
        localStorage.removeItem('bacplus_medie');
        localStorage.removeItem('bacplus_profile');
        this.applyFilters();
      }
    }

    // ===== TABLE RENDERER =====

    class TableRenderer {
      static render(list, generatedAt) {
        var app = document.getElementById('app');
        app.innerHTML = '';

        var loading = document.createElement('div');
        loading.className = 'status';
        loading.innerHTML = '<div class="spinner"></div>Se incarca datele...';
        app.appendChild(loading);

        DataLoader.load()
          .then(function(rawList) {
            list.setSchools(rawList);
            loading.remove();
            TableRenderer.renderTable(list, generatedAt);
          })
          .catch(function(err) {
            loading.className = 'status.error';
            loading.innerHTML = '<p>Eroare: ' + TableRenderer.escape(err.message) + '</p>';
          });
      }

      static refresh(list) {
        var app = document.getElementById('app');
        var table = app.querySelector('table');
        if (!table) return;

        var tbody = table.querySelector('tbody');
        if (!tbody) return;

        var schools = list.filtered;
        if (!schools.length) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#6b6f82;">Niciun rezultat.</td></tr>';
          return;
        }

        var html = '';
        schools.forEach(function(s) {
          html += TableRenderer.buildSchoolRow(s);
          html += TableRenderer.buildSchoolBody(s, list);
        });
        tbody.innerHTML = html;

        var infoSpan = app.querySelector('.info-bar span');
        if (infoSpan) infoSpan.textContent = schools.length + ' licee afisate din ' + list.all.length;
      }

      static renderTable(list, generatedAt) {
        var app = document.getElementById('app');
        app.innerHTML = '';

        var schools = list.filtered;
        if (!schools.length) {
          app.innerHTML = '<div class="status">Niciun liceu.</div>';
          return;
        }

        var table = document.createElement('table');
        var thead = document.createElement('thead');
        thead.innerHTML = TableRenderer.buildHeader(list);
        table.appendChild(thead);
        var tbody = document.createElement('tbody');
        schools.forEach(function(s) {
          tbody.innerHTML += TableRenderer.buildSchoolRow(s);
          tbody.innerHTML += TableRenderer.buildSchoolBody(s, list);
        });
        table.appendChild(tbody);

        app.appendChild(table);

        var info = document.createElement('div');
        info.className = 'info-bar';
        info.innerHTML = '<span>' + schools.length + ' licee afisate din ' + list.all.length + '</span>'
          + '<div class="legend">'
            + '<span class="legend-item"><span class="legend-dot dot-green"></span> >= 9.0</span>'
            + '<span class="legend-item"><span class="legend-dot dot-yellow"></span> 8.0 - 8.99</span>'
            + '<span class="legend-item"><span class="legend-dot dot-red"></span> < 8.0</span>'
          + '</div>';
        app.appendChild(info);
      }

      static buildHeader(list) {
        var header = '<thead><tr>';
        var columns = [
          { key: 'rank', label: 'Rank' },
          { key: 'nume', label: 'Liceu' },
          { key: 'siiir', label: 'SIIIR' },
          { key: 'medieAdm', label: 'Medie' },
          { key: 'numCandidati', label: 'Candidati' },
          { key: 'rataPromovare', label: 'Promo %' }
        ];
        columns.forEach(function(col) {
          var arrow = '';
          if (list.sortKey === col.key) {
            arrow = list.sortDir === 'asc' ? ' \u25B2' : ' \u25BC';
          }
          header += '<th data-key="' + col.key + '">' + col.label + arrow + '</th>';
        });
        header += '</tr></thead>';
        return header;
      }

      static buildSchoolRow(s) {
        var rankClass = s.rank <= 3 ? 'rank top3' : 'rank';
        var displayRank = s.rank != null ? s.rank : '—';

        return '<tr class="school-row school-header">'
          + '<td class="' + rankClass + '">' + displayRank + '</td>'
          + '<td class="name">' + TableRenderer.escape(s.nume) + '</td>'
          + '<td class="code">' + TableRenderer.escape(s.siiir) + '</td>'
          + '<td>' + TableRenderer.valueCell(s.medieAdm) + '</td>'
          + '<td>' + (s.numCandidati != null ? s.numCandidati : '\u2014') + '</td>'
          + '<td>' + (s.rataPromovare != null ? s.rataPromovare + '%' : '\u2014') + '</td>'
          + '</tr>';
      }

      static buildSchoolBody(s, list) {
        var html = '<tr><td colspan="6" style="padding:0;">';
        html += '<div class="school-body-inner">';

        // Grupuri section
        if (s.grupuri.length > 0) {
          html += '<div class="section-title">Grupuri principale</div>';
          html += '<table class="sub-table"><thead><tr>';
          html += '<th>Grup</th>';
          html += '<th>Media Adm.</th>';
          html += '<th>Locuri</th>';
          html += '</tr></thead><tbody>';
          s.grupuri.forEach(function(g) {
            var isMatch = list.profileMatchesFilter(g);
            var rowClass = isMatch ? 'highlight-green' : '';
            html += '<tr class="' + rowClass + '">';
            html += '<td><span class="badge-group">' + TableRenderer.escape(g.nume) + '</span></td>';
            html += '<td>' + TableRenderer.valueCell(g.medieAdm) + '</td>';
            html += '<td>' + (g.locuri != null ? g.locuri : '\u2014') + '</td>';
            html += '</tr>';
          });
          html += '</tbody></table>';
        }

        // Profiluri section
        if (s.profiluri.length > 0) {
          html += '<div class="section-title" style="margin-top:1.5rem;">Profiluri si specializari</div>';
          html += '<table class="sub-table"><thead><tr>';
          html += '<th>Profil</th>';
          html += '<th>Media Adm.</th>';
          html += '<th>Locuri</th>';
          html += '<th>Grupuri</th>';
          html += '</tr></thead><tbody>';
          s.profiluri.forEach(function(p) {
            var isMatch = list.profileMatchesFilter(p);
            var rowClass = isMatch ? 'highlight-green' : '';
            var grupeHtml = '';
            if (p.grupe && p.grupe.length > 0) {
              grupeHtml = p.grupe.map(function(g) {
                return g.grupa + ' (' + g.medieAdm + ')';
              }).join(', ');
            }
            html += '<tr class="' + rowClass + '">';
            html += '<td>' + TableRenderer.escape(p.nume) + '</td>';
            html += '<td>' + TableRenderer.valueCell(p.medieAdm) + '</td>';
            html += '<td>' + (p.locuri != null ? p.locuri : '\u2014') + '</td>';
            html += '<td style="font-size:0.8rem;color:#6b6f82;">' + TableRenderer.escape(grupeHtml) + '</td>';
            html += '</tr>';
          });
          html += '</tbody></table>';
        }

        html += '</div></td></tr>';
        return html;
      }

      static valueCell(val) {
        if (val == null) return '<span style="color:#6b6f82">\u2014</span>';
        var cls = val >= 9 ? 'value-high' : val >= 8 ? 'value-medium' : 'value-low';
        return '<span class="' + cls + '">' + val.toFixed(3) + '</span>';
      }

      static escape(str) {
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }
    }

    // ===== APP =====

    class App {
      constructor() {
        this.list = new SchoolList();
      }

      init() {
        var searchInput = document.getElementById('searchInput');
        var filterInput = document.getElementById('filterInput');
        var profileSelect = document.getElementById('profileSelect');
        var resetBtn = document.getElementById('resetBtn');
        var self = this;

        var savedSearch = localStorage.getItem('bacplus_search');
        var savedMedie = localStorage.getItem('bacplus_medie');
        var savedProfile = localStorage.getItem('bacplus_profile');

        if (savedSearch) searchInput.value = savedSearch;
        if (savedMedie) filterInput.value = savedMedie;
        if (savedProfile) profileSelect.value = savedProfile;

        DataLoader.load()
          .then(function(data) {
            var schools = Array.isArray(data) ? data : (data.schools || []);
            var generatedAt = data.generatedAt || (Array.isArray(data) ? null : null);

            // Set generation timestamp display
            if (data.generatedAt) {
              var date = new Date(data.generatedAt);
              var day = String(date.getDate()).padStart(2, '0');
              var month = String(date.getMonth() + 1).padStart(2, '0');
              var year = date.getFullYear();
              var hours = String(date.getHours()).padStart(2, '0');
              var minutes = String(date.getMinutes()).padStart(2, '0');
              var formatted = day + '.' + month + '.' + year + ', ' + hours + ':' + minutes;
              document.getElementById('genInfo').textContent = 'Date generate la data de: ' + formatted;
            } else {
              document.getElementById('genInfo').textContent = 'Date din data.json — generate cu: node generate.js';
            }

            if (savedSearch) self.list.searchQuery = savedSearch.toLowerCase().trim();
            if (savedMedie) self.list.filterMedie = parseFloat(savedMedie);
            if (savedProfile) self.list.profileFilter = savedProfile;
            self.list.setSchools(schools);
            self._populateProfiles(profileSelect, savedProfile);
            self.list.applyAllFilters();
            self._initTable(searchInput, filterInput, profileSelect);
          });

        searchInput.addEventListener('input', function() {
          self.list.searchQuery = searchInput.value.toLowerCase().trim();
          localStorage.setItem('bacplus_search', searchInput.value);
          self.list.applyFilters();
          TableRenderer.refresh(self.list);
        });

        filterInput.addEventListener('input', function() {
          self.list.filterMedie = filterInput.value === '' ? null : parseFloat(filterInput.value);
          localStorage.setItem('bacplus_medie', filterInput.value);
          self.list.applyFilters();
          TableRenderer.refresh(self.list);
        });

        profileSelect.addEventListener('change', function() {
          self.list.profileFilter = profileSelect.value;
          localStorage.setItem('bacplus_profile', profileSelect.value);
          self.list.applyFilters();
          TableRenderer.refresh(self.list);
        });

        resetBtn.addEventListener('click', function() {
          searchInput.value = '';
          filterInput.value = '';
          profileSelect.value = '';
          self.list.searchQuery = '';
          self.list.filterMedie = null;
          self.list.profileFilter = '';
          localStorage.removeItem('bacplus_search');
          localStorage.removeItem('bacplus_medie');
          localStorage.removeItem('bacplus_profile');
          self.list.applyFilters();
          TableRenderer.refresh(self.list);
        });

        document.addEventListener('click', function(e) {
          var th = e.target.closest('th[data-key]');
          if (th) {
            var key = th.getAttribute('data-key');
            if (key) {
              var dir = self.list.sortKey === key && self.list.sortDir === 'asc' ? 'desc' : 'asc';
              self.list.sortKey = key;
              self.list.sortDir = dir;
              self.list.applyFilters();
              TableRenderer.refresh(self.list);
            }
          }
        });
      }

      _populateProfiles(profileSelect, savedProfile) {
        var options = '<option value="">Toate profilurile</option>';
        if (this.list.uniqueProfiles) {
          this.list.uniqueProfiles.forEach(function(p) {
            var selected = savedProfile === p ? ' selected' : '';
            options += '<option value="' + p + '"' + selected + '>' + TableRenderer.escape(p) + '</option>';
          });
        }
        profileSelect.innerHTML = options;
      }

      _initTable(searchInput, filterInput, profileSelect) {
        TableRenderer.renderTable(this.list);
      }

      _refresh(searchInput, filterInput, profileSelect) {
        TableRenderer.refresh(this.list);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      var app = new App();
      app.init();
    });
  </script>
</body>
</html>
