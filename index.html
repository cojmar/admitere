<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Licee Bucuresti</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4ea;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #8b8fa3;
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .controls input {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      color: #e1e4ea;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      flex: 1;
      min-width: 180px;
      transition: border-color 0.2s;
    }

    .controls input:focus {
      border-color: #6c63ff;
    }

    .btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover { background: #5a52e0; }

    .status {
      text-align: center;
      padding: 3rem;
      color: #8b8fa3;
      font-size: 1rem;
    }

    .status.error { color: #ff6b6b; }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #2a2d3a;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .school-row {
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .school-row:hover {
      background: #22253a !important;
    }

    .school-row .arrow {
      transition: transform 0.2s;
      display: inline-block;
    }

    .school-row .arrow.open {
      transform: rotate(90deg);
    }

    .school-header td {
      padding: 0.85rem 1rem;
      border-bottom: 2px solid #2a2d3a;
    }

    .school-body {
      display: none;
    }

    .school-body.open {
      display: table-row;
    }

    .school-body-inner {
      padding: 1rem 1rem 1rem 3rem;
      background: #151720;
      border-bottom: 1px solid #2a2d3a;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6c63ff;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sub-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .sub-table th {
      background: #1e2136;
      padding: 0.6rem 0.8rem;
      text-align: left;
      font-weight: 600;
      color: #a0a4b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #2a2d3a;
    }

    .sub-table td {
      padding: 0.55rem 0.8rem;
      border-bottom: 1px solid #1e2136;
    }

    .sub-table tbody tr:hover {
      background: #1a1d27;
    }

    .badge-group {
      display: inline-block;
      background: rgba(108, 99, 255, 0.15);
      color: #6c63ff;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    td.rank {
      font-weight: 700;
      color: #6c63ff;
      width: 50px;
      text-align: center;
    }

    td.rank.top3 { color: #ffd700; font-size: 1rem; }

    td.name {
      font-weight: 500;
      color: #fff;
      max-width: 350px;
    }

    td.code {
      color: #6b6f82;
      font-family: monospace;
      font-size: 0.82rem;
    }

    td.value-high { color: #4ade80; font-weight: 600; }
    td.value-medium { color: #fbbf24; font-weight: 600; }
    td.value-low { color: #ff6b6b; font-weight: 600; }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      color: #6b6f82;
      font-size: 0.82rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-green { background: #4ade80; }
    .dot-yellow { background: #fbbf24; }
    .dot-red { background: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Top Licee Bucuresti</h1>
      <p>Date din data.json — genereaza cu: node generate.js</p>
    </header>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Cauta liceu dupa nume..." />
      <input type="text" id="filterInput" placeholder="Filtreaza medie adm (ex: 9.5)..." />
      <button class="btn" id="resetBtn">Reseteaza</button>
    </div>

    <div class="table-wrapper" id="app"></div>
  </div>

  <script>
    // ===== DATA LOADER =====

    class DataLoader {
      static async load(path) {
        const resp = await fetch(path || 'data.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      }
    }

    // ===== SCHOOL MODEL =====

    class School {
      constructor(raw) {
        this.nume = raw.nume;
        this.siiir = raw.siiir;
        this.medieBac = raw.medieBac;
        this.medieAdm = raw.medieAdm;
        this.rataPromovare = raw.rataPromovare;
        this.numCandidati = raw.numCandidati;
        this.rank = raw.rank;
        this.grupuri = (raw.profiluri && raw.profiluri.grupuri) || [];
        this.profiluri = (raw.profiluri && raw.profiluri.profiluri) || [];
      }
    }

    // ===== LIST MANAGER =====

    class SchoolList {
      constructor() {
        this.all = [];
        this.filtered = [];
        this.searchQuery = '';
        this.filterMedie = null;
        this.sortKey = 'rank';
        this.sortDir = 'asc';
        this.expandedSchools = new Set();
      }

      setSchools(rawList) {
        this.all = rawList.map(r => new School(r));
        this.applyFilters();
      }

      setSearch(query) {
        this.searchQuery = query.toLowerCase().trim();
        this.applyFilters();
      }

      setMedieFilter(value) {
        this.filterMedie = value === '' ? null : parseFloat(value);
        this.applyFilters();
      }

      sort(key, dir) {
        this.sortKey = key;
        this.sortDir = dir;
        this.applyFilters();
      }

      applyFilters() {
        this.filtered = this.all.filter(s => {
          if (this.searchQuery && !s.nume.toLowerCase().includes(this.searchQuery)) {
            return false;
          }
          if (this.filterMedie != null && (s.medieAdm == null || s.medieAdm > this.filterMedie)) {
            return false;
          }
          return true;
        });

        this.filtered.sort((a, b) => {
          if (this.sortKey === 'nume') {
            return this.sortDir === 'asc'
              ? a.nume.localeCompare(b.nume)
              : b.nume.localeCompare(a.nume);
          }
          var va = a[this.sortKey] != null ? a[this.sortKey] : -Infinity;
          var vb = b[this.sortKey] != null ? b[this.sortKey] : -Infinity;
          return this.sortDir === 'asc' ? va - vb : vb - va;
        });
      }

      reset() {
        this.searchQuery = '';
        this.filterMedie = null;
        this.sortKey = 'rank';
        this.sortDir = 'asc';
        this.applyFilters();
      }

      toggleSchool(id) {
        if (this.expandedSchools.has(id)) {
          this.expandedSchools.delete(id);
        } else {
          this.expandedSchools.add(id);
        }
      }

      isExpanded(id) {
        return this.expandedSchools.has(id);
      }
    }

    // ===== TABLE RENDERER =====

    class TableRenderer {
      static render(list) {
        var app = document.getElementById('app');
        app.innerHTML = '';

        var loading = document.createElement('div');
        loading.className = 'status';
        loading.innerHTML = '<div class="spinner"></div>Se incarca datele...';
        app.appendChild(loading);

        DataLoader.load()
          .then(function(rawList) {
            list.setSchools(rawList);
            loading.remove();
            TableRenderer.renderTable(list);
          })
          .catch(function(err) {
            loading.className = 'status.error';
            loading.innerHTML = '<p>Eroare: ' + TableRenderer.escape(err.message) + '</p>';
          });
      }

      static refresh(list) {
        var app = document.getElementById('app');
        var table = app.querySelector('table');
        if (!table) return;

        var tbody = table.querySelector('tbody');
        if (!tbody) return;

        var schools = list.filtered;
        if (!schools.length) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#6b6f82;">Niciun rezultat.</td></tr>';
          return;
        }

        var html = '';
        schools.forEach(function(s) {
          html += TableRenderer.buildSchoolRow(s);
          if (list.isExpanded(s.rank)) {
            html += TableRenderer.buildSchoolBody(s);
          }
        });
        tbody.innerHTML = html;

        var infoSpan = app.querySelector('.info-bar span');
        if (infoSpan) infoSpan.textContent = schools.length + ' licee afisate din ' + list.all.length;
      }

      static renderTable(list) {
        var app = document.getElementById('app');
        app.innerHTML = '';

        var schools = list.filtered;
        if (!schools.length) {
          app.innerHTML = '<div class="status">Niciun liceu.</div>';
          return;
        }

        var table = document.createElement('table');
        table.innerHTML = TableRenderer.buildHeader(list);
        table.innerHTML += '<tbody>';
        schools.forEach(function(s) {
          table.innerHTML += TableRenderer.buildSchoolRow(s);
          if (list.isExpanded(s.rank)) {
            table.innerHTML += TableRenderer.buildSchoolBody(s);
          }
        });
        table.innerHTML += '</tbody>';

        app.appendChild(table);

        var info = document.createElement('div');
        info.className = 'info-bar';
        info.innerHTML = '<span>' + schools.length + ' licee afisate din ' + list.all.length + '</span>'
          + '<div class="legend">'
            + '<span class="legend-item"><span class="legend-dot dot-green"></span> >= 9.0</span>'
            + '<span class="legend-item"><span class="legend-dot dot-yellow"></span> 8.0 - 8.99</span>'
            + '<span class="legend-item"><span class="legend-dot dot-red"></span> < 8.0</span>'
          + '</div>';
        app.appendChild(info);
      }

      static buildHeader(list) {
        var header = '<thead><tr>';
        var columns = [
          { key: 'rank', label: 'Rank' },
          { key: 'nume', label: 'Liceu' },
          { key: 'siiir', label: 'SIIIR' },
          { key: 'medieAdm', label: 'Media Adm.' },
          { key: 'numCandidati', label: 'Candidati' },
          { key: 'rataPromovare', label: 'Promovare' }
        ];
        columns.forEach(function(col) {
          var arrow = '';
          if (list.sortKey === col.key) {
            arrow = list.sortDir === 'asc' ? ' \u25B2' : ' \u25BC';
          }
          header += '<th data-key="' + col.key + '">' + col.label + arrow + '</th>';
        });
        header += '</tr></thead>';
        return header;
      }

      static buildSchoolRow(s) {
        var rankClass = s.rank <= 3 ? 'rank top3' : 'rank';
        var displayRank = s.rank != null ? s.rank : '—';
        var arrowClass = 'arrow';
        var arrowChar = '\u25B6';

        return '<tr class="school-row school-header" data-id="' + s.rank + '">'
          + '<td class="' + rankClass + '"><span class="' + arrowClass + '">' + arrowChar + '</span> ' + displayRank + '</td>'
          + '<td class="name">' + TableRenderer.escape(s.nume) + '</td>'
          + '<td class="code">' + TableRenderer.escape(s.siiir) + '</td>'
          + '<td>' + TableRenderer.valueCell(s.medieAdm) + '</td>'
          + '<td>' + (s.numCandidati != null ? s.numCandidati : '\u2014') + '</td>'
          + '<td>' + (s.rataPromovare != null ? s.rataPromovare + '%' : '\u2014') + '</td>'
          + '<td></td>'
          + '</tr>';
      }

      static buildSchoolBody(s) {
        var html = '<tr class="school-body open"><td colspan="7" style="padding:0;">';
        html += '<div class="school-body-inner">';

        // Grupuri section
        if (s.grupuri.length > 0) {
          html += '<div class="section-title">Grupuri principale</div>';
          html += '<table class="sub-table"><thead><tr>';
          html += '<th>Grup</th>';
          html += '<th>Media Adm.</th>';
          html += '<th>Locuri</th>';
          html += '</tr></thead><tbody>';
          s.grupuri.forEach(function(g) {
            html += '<tr>';
            html += '<td><span class="badge-group">' + TableRenderer.escape(g.nume) + '</span></td>';
            html += '<td>' + TableRenderer.valueCell(g.medieAdm) + '</td>';
            html += '<td>' + (g.locuri != null ? g.locuri : '\u2014') + '</td>';
            html += '</tr>';
          });
          html += '</tbody></table>';
        }

        // Profiluri section
        if (s.profiluri.length > 0) {
          html += '<div class="section-title" style="margin-top:1.5rem;">Profiluri si specializari</div>';
          html += '<table class="sub-table"><thead><tr>';
          html += '<th>Profil</th>';
          html += '<th>Media Adm.</th>';
          html += '<th>Locuri</th>';
          html += '<th>Grupuri</th>';
          html += '</tr></thead><tbody>';
          s.profiluri.forEach(function(p) {
            var grupeHtml = '';
            if (p.grupe && p.grupe.length > 0) {
              grupeHtml = p.grupe.map(function(g) {
                return g.grupa + ' (' + g.medieAdm + ')';
              }).join(', ');
            }
            html += '<tr>';
            html += '<td>' + TableRenderer.escape(p.nume) + '</td>';
            html += '<td>' + TableRenderer.valueCell(p.medieAdm) + '</td>';
            html += '<td>' + (p.locuri != null ? p.locuri : '\u2014') + '</td>';
            html += '<td style="font-size:0.8rem;color:#6b6f82;">' + TableRenderer.escape(grupeHtml) + '</td>';
            html += '</tr>';
          });
          html += '</tbody></table>';
        }

        html += '</div></td></tr>';
        return html;
      }

      static valueCell(val) {
        if (val == null) return '<span style="color:#6b6f82">\u2014</span>';
        var cls = val >= 9 ? 'value-high' : val >= 8 ? 'value-medium' : 'value-low';
        return '<span class="' + cls + '">' + val.toFixed(3) + '</span>';
      }

      static escape(str) {
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }
    }

    // ===== APP =====

    class App {
      constructor() {
        this.list = new SchoolList();
      }

      init() {
        var searchInput = document.getElementById('searchInput');
        var filterInput = document.getElementById('filterInput');
        var resetBtn = document.getElementById('resetBtn');
        var self = this;

        TableRenderer.render(this.list);

        var debounce;
        searchInput.addEventListener('input', function() {
          clearTimeout(debounce);
          debounce = function() {
            self.list.setSearch(searchInput.value);
            TableRenderer.refresh(self.list);
          };
          setTimeout(debounce, 200);
        });

        filterInput.addEventListener('input', function() {
          self.list.setMedieFilter(filterInput.value);
          TableRenderer.refresh(self.list);
        });

        resetBtn.addEventListener('click', function() {
          searchInput.value = '';
          filterInput.value = '';
          self.list.reset();
          TableRenderer.refresh(self.list);
        });

        document.addEventListener('click', function(e) {
          var schoolRow = e.target.closest('.school-row');
          if (schoolRow) {
            var id = parseInt(schoolRow.getAttribute('data-id'));
            self.list.toggleSchool(id);
            TableRenderer.refresh(self.list);
            return;
          }

          var th = e.target.closest('th[data-key]');
          if (th) {
            var key = th.getAttribute('data-key');
            if (key) {
              var dir = self.list.sortKey === key && self.list.sortDir === 'asc' ? 'desc' : 'asc';
              self.list.sort(key, dir);
              TableRenderer.renderTable(self.list);
            }
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      var app = new App();
      app.init();
    });
  </script>
</body>
</html>
